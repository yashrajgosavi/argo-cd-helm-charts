apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: 1.0.0
    app.kubernetes.io/part-of: {{ .Values.parent }}
  annotations:
        service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-2:501429054313:certificate/3289deea-d8d0-4cf0-b044-8146bc919c32
        service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
        service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
spec:
  selector:
    app: {{ .Values.name }}
    tier: {{ .Values.tier }}
  ports:
    - name: https
      port: 443
      targetPort: {{ .Values.containerPort }}   
  type: LoadBalancer